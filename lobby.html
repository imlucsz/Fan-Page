<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escolha seu Universo — YOU × Curry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700;1,900&family=Montserrat:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="lobby.css" />
</head>
<body>

<!-- Cursor -->
<div id="csr"></div>
<div id="csrDot"></div>

<!-- Fade overlay -->
<div id="overlay"></div>

<!-- ============================================================
     LOBBY SPLIT-SCREEN
============================================================ -->
<div id="lobby">

  <!-- ══════════════════════
       LADO ESQUERDO — YOU
  ══════════════════════ -->
  <div class="panel" id="pYOU">

    <canvas id="youCanvas"></canvas>
    <div class="grain"></div>
    <div class="vig-you"></div>

    <div class="pcontent">

      <!-- Badge Netflix -->
      <div class="badge-netflix">
        <span class="n-icon">N</span>
        <span class="badge-txt">Series</span>
      </div>

      <!-- Centro: taglines -->
      <div class="you-mid">
        <p class="you-tagline">Uma série original Netflix</p>
        <p class="you-sub">Penn Badgley</p>
      </div>

      <!-- Inferior: nome + botão -->
      <div class="you-bot">
        <div>
          <p class="you-name">Penn Badgley</p>
          <p class="you-role">como <em>Joe Goldberg</em></p>
        </div>
        <button class="enter-btn btn-you" onclick="goTo('you')">
          <span class="btn-t">Entrar no Universo YOU</span>
          <span class="btn-a">→</span>
          <div class="btn-rip"></div>
        </button>
      </div>

    </div>
  </div><!-- /#pYOU -->

  <!-- Divisor -->
  <div id="divider">
    <div class="div-line"></div>
    <div class="div-vs">VS</div>
    <div class="div-line"></div>
  </div>

  <!-- ══════════════════════════
       LADO DIREITO — CURRY
  ══════════════════════════ -->
  <div class="panel" id="pCurry">

    <!-- Orbs de glow verde -->
    <div class="orbs">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>
    <div class="grain"></div>
    <div class="vig-curry"></div>

    <div class="pcontent">

      <!-- Badge Spotify -->
      <div class="badge-spotify">
        <svg class="sp-icon" width="26" height="26" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="12" fill="#1DB954"/>
          <path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.4-.85 13.1 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.3.25zm-.1 2.8c-.25.4-.75.5-1.15.25-2.7-1.65-6.8-2.15-9.95-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.65-1.1 8.15-.55 11.25 1.35.4.25.5.75.3 1zm-1.3 2.7c-.2.35-.6.45-.9.25-2.35-1.45-5.3-1.75-8.8-.95-.35.1-.65-.15-.75-.45-.1-.35.15-.65.45-.75 3.8-.85 7.1-.5 9.7 1.1.35.15.4.55.3.8z" fill="white"/>
        </svg>
        <span class="sp-txt">Featured Athlete</span>
      </div>

      <!-- VINIL -->
      <div class="vinyl-wrap">
        <div class="vinyl-disk">
          <div class="grooves">
            <div class="groove" style="width:44%;height:44%;top:28%;left:28%;"></div>
            <div class="groove" style="width:56%;height:56%;top:22%;left:22%;"></div>
            <div class="groove" style="width:68%;height:68%;top:16%;left:16%;"></div>
            <div class="groove" style="width:80%;height:80%;top:10%;left:10%;"></div>
            <div class="groove" style="width:90%;height:90%;top:5%;left:5%;"></div>
          </div>
          <div class="vinyl-label">
            <span class="vn">30</span>
            <span class="vt">GSW</span>
          </div>
        </div>
        <div class="needle">
          <div class="needle-arm"></div>
          <div class="needle-tip"></div>
        </div>
      </div>

      <!-- Nome + Equalizador -->
      <div class="curry-name-blk">
        <h2 class="curry-title">STEPHEN<br/>CURRY</h2>
        <div class="eq">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <p class="curry-sub">Golden State Warriors · Nº 30</p>
      </div>

      <!-- Playlist de conquistas -->
      <ul class="playlist">
        <li class="track">
          <span class="trk-n">01</span>
          <span class="trk-l">4× Campeão NBA</span>
          <span class="trk-b">🏆</span>
        </li>
        <li class="track">
          <span class="trk-n">02</span>
          <span class="trk-l">2× MVP da Liga</span>
          <span class="trk-b">⭐</span>
        </li>
        <li class="track">
          <span class="trk-n">03</span>
          <span class="trk-l">3.747+ arremessos de 3pts</span>
          <span class="trk-b">🎯</span>
        </li>
        <li class="track">
          <span class="trk-n">04</span>
          <span class="trk-l">Ouro Olímpico — Paris 2024</span>
          <span class="trk-b">🥇</span>
        </li>
      </ul>

      <!-- Botão -->
      <button class="enter-btn btn-curry" onclick="goTo('curry')">
        <span class="btn-t">Entrar no Universo Curry</span>
        <span class="btn-a">→</span>
        <div class="btn-rip"></div>
      </button>

    </div>
  </div><!-- /#pCurry -->

</div><!-- /#lobby -->

<audio id="audioHelloYou" src="Audio/Hello_you.mp3" preload="auto"></audio>
<script src="lobby.js"></script>
</body>
</html>
